name: Playwright Automation

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependency
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run pytest
        run: |
          pytest