name: K6 Performance Test

on:
  push:
    branches:
      - main

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Mock API Dependencies
        run: |
          pip install fastapi uvicorn

      - name: Start Mock API
        run: |
          cd performance/mock
          nohup uvicorn auth_server:app --host 0.0.0.0 > server.log 2>&1 &
          sleep 5

          echo "=== Server Log ==="
          cat server.log

          curl --fail http://127.0.0.1:8000/docs

      - name: Run k6 Test
        uses: grafana/run-k6-action@v1
        with:
          path: performance/k6/login_load_test.js