name: K6 Performance Test

on:
  push:
    branches:
      - master

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Mock API Dependencies
        run: |
          pip install -r performance/mock/requirements.txt

      - name: Start Mock API
        run: |
          cd performance/mock
          nohup uvicorn auth_server:app --host 0.0.0.0 > server.log 2>&1 &
          sleep 5

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | \
          sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | \
          sudo tee /etc/apt/sources.list.d/k6.list

          sudo apt-get update

          sudo apt-get install -y k6

      - name: Verify k6
        run: |
          k6 version

      - name: Run k6 Test
        run: |
          cd performance/k6
          k6 run login_load_test.js